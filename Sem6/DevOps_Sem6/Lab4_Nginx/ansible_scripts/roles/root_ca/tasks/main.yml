---
# tasks file for roles/root_ca

- name: Ensure CA directory exists
  ansible.builtin.file:
    path: "{{ root_ca_certs_dir }}"
    state: directory
    mode: '0755'
  become: yes 

- name: Generate private key
  community.crypto.openssl_privatekey:
    type: RSA
    path: "{{ root_ca_key_path }}"
    size: "{{ root_ca_key_size }}"
  become: yes

- name: Generate CSR
  community.crypto.openssl_csr_pipe:
    privatekey_path: "{{ root_ca_key_path }}"
    country_name: "{{ root_ca_country }}"
    state_or_province_name: "{{ root_ca_state }}"
    locality_name: "{{ root_ca_locality }}"
    organization_name: "{{ root_ca_organization }}"
    organizational_unit_name: "{{ root_ca_organization_unit }}"
    email_address: "{{ root_ca_email }}"
    common_name: "{{ root_ca_common_name }}"
    basic_constraints: ["CA:TRUE", "pathlen:1"]
    key_usage: ["keyCertSign", "cRLSign"]
  register: csr_result
  become: yes

- name: Generate root CA certificate
  community.crypto.x509_certificate:
    path: "{{ root_ca_cert_path }}"
    csr_content: "{{  csr_result.csr  }}"
    privatekey_path: "{{ root_ca_key_path }}"
    ownca_path: "{{ root_ca_cert_path }}"
    provider: selfsigned
    selfsigned_digest: sha256
    selfsigned_not_after: "+3650d"
    selfsigned_version: 3
  become: yes


