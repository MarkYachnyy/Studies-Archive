version: "3.9"

services:
  backend:
    build: backend/
    environment:
      MYSQL_HOST: "db"
      JWT_SECRET_TOKEN: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiYWRtaW4iOnRydWUsImlhdCI6MTUxNjIzOTAyMn0.KMUFsIDTnFmyG3nMiGM6H9FNFUROf3wh7SmqJp-QV30"
      CORS_ORIGIN_REGEX: >- 
        http([s])?:\/\/localhost:3002
    ports:
      - "3001:3001"
    depends_on:
      - db
    restart: always

    

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    environment:
      SERVER_ORIGIN: "http://localhost:3001"
    ports:
      - "3002:3002"
    depends_on:
      - backend
    restart: always



  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tradeoffer_db
    ports:
      - "3306:3306"


  adminer:
    image: adminer
    restart: always
    environment:
      ADMINER_DEFAULT_DB_DRIVER: mysql
      ADMINER_DEFAULT_SERVER: db
      ADMINER_PLUGINS: tables-filter tinymce
    ports:
      - "30000:8080"
    depends_on:
      - db